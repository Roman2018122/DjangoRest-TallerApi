          nullable: true
          maxLength: 20
        telefono:
          type: string
          maxLength: 20
        direccion:
          type: string
          maxLength: 255
        activo:
          type: boolean
        creado_en:
          type: string
          format: date-time
          readOnly: true
        actualizado_en:
          type: string
          format: date-time
          readOnly: true
