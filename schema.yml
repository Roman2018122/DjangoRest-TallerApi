components:
  schemas:
    CargoEnum:
      enum:
      - ADMINISTRADOR
      - RECEPCIONISTA
      - MECANICO
      - SUPERVISOR
      type: string
      description: |-
        * `ADMINISTRADOR` - Administrador
        * `RECEPCIONISTA` - Recepcionista
        * `MECANICO` - Mecánico
        * `SUPERVISOR` - Supervisor
    Cita:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cliente:
          type: integer
          readOnly: true
        cliente_nombre:
          type: string
          readOnly: true
        vehiculo:
          type: integer
        vehiculo_placa:
          type: string
          readOnly: true
        servicio:
          type: integer
          nullable: true
        servicio_nombre:
          type: string
          readOnly: true
        fecha_solicitada:
          type: string
          format: date-time
        motivo:
          type: string
          maxLength: 255
        observaciones_cliente:
          type: string
        respuesta_taller:
          type: string
          readOnly: true
        estado:
          allOf:
          - $ref: '#/components/schemas/CitaEstadoEnum'
          readOnly: true
        estado_display:
          type: string
          readOnly: true
        creado_en:
          type: string
          format: date-time
          readOnly: true
        actualizado_en:
          type: string
          format: date-time
          readOnly: true
      required:
      - actualizado_en
      - cliente
      - cliente_nombre
      - creado_en
      - estado
      - estado_display
      - fecha_solicitada
      - id
      - motivo
      - respuesta_taller
      - servicio_nombre
      - vehiculo
      - vehiculo_placa
    CitaEstadoEnum:
      enum:
      - SOLICITADA
      - CONFIRMADA
      - REPROGRAMADA
      - CANCELADA
      - ATENDIDA
      - NO_ASISTIO
