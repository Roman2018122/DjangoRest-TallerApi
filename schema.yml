    get:
      operationId: citas_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - citas
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCitaList'
          description: ''
    post:
      operationId: citas_create
      tags:
      - citas
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cita'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cita'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cita'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'
          description: ''
  /api/citas/{id}/:
    get:
      operationId: citas_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
