      description: |-
        * `SOLICITADA` - Solicitada
        * `CONFIRMADA` - Confirmada
        * `REPROGRAMADA` - Reprogramada
        * `CANCELADA` - Cancelada
        * `ATENDIDA` - Atendida
        * `NO_ASISTIO` - No asistió
    Cliente:
      type: object
